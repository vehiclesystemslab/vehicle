# ============================================================================
# VEHICLE Systems Lab - Experiment 01: Base Dissipation
# ============================================================================
#
# Purpose:
#   Evaluate baseline dissipation behavior under simple dynamics.
#   Test hypothesis H1 (Monotone Dissipation): T(X(t+1)) ≤ T(X(t)) + ε
#
# Reference:
#   VEHICLE 3D with E.I.A.R.(V) (2026), Section 4 - Experimental Layer H1–H5
#
# ============================================================================

experiment:
  name: "exp01_base_dissipation"
  description: "Baseline monotone dissipation validation under governed dynamics"
  version: "0.1.0"
  author: "VEHICLE Systems Lab"
  date: "2026-04-28"

reproducibility:
  seed: 42
  numpy_version: "1.24+"
  python_version: "3.10+"

network:
  initial_nodes: 10
  topology: "erdos_renyi"
  edge_probability: 0.3
  edge_weight_range: [0.5, 1.5]

initial_state:
  E_range: [-1.0, 1.0]
  I_range: [0.0, 1.0]
  A_range: [0.0, 1.0]
  R_range: [0.0, 1.0]
  V_range: [0.0, 1.0]
  initialization: "random_uniform"

parameters:
  lambda_coupling: 1.0          # Internal coupling strength (λ)
  gamma_gradient: 0.05          # Gradient descent step size (γ)
  alpha_relaxation: 0.3         # Relaxation weight (α) in update rule
  tau_limit: 0.5                # Coherence threshold for admissible region K

dynamics:
  max_iterations: 50
  update_rule: "relaxed_projection"  # S_i(t+1) = (1-α)S_i(t) + α V_op(S_i(t))
  projection_enabled: true
  clipping_enabled: true
  clip_range: [-2.0, 2.0]

validation:
  check_h1_dissipation: true
  epsilon_tolerance: 1.0e-6     # Numerical tolerance for H1 validation
  track_global_tension: true
  track_local_tensions: true
  save_iteration_history: true

output:
  results_dir: "results/exp01_base_dissipation"
  save_config_snapshot: true
  save_metrics_summary: true
  save_history_csv: true
  save_final_state: true
  generate_figures: true

logging:
  level: "INFO"
  log_file: "exp01_base_dissipation.log"
  verbose: true
